# Recovery test: steady load with periodic faults injected INSIDE the operators;
# measure recovery time as the dip in processedRecordsPerSec after each fault.
# Checkpointing must be enabled for stateful recovery (override checkpoint.dir).
job:
  parallelism: 2
source:
  rateMode: CONSTANT
  ratePerSec: 20000
  numKeys: 10000
window:
  type: TUMBLING_TIME
  sizeMs: 5000
state:
  backend: ROCKSDB
checkpoint:
  enabled: true
  intervalMs: 10000
  dir: "s3://flink-checkpoints/kill-recovery"
restart:
  strategy: fixed-delay
  attempts: 100
  delayMs: 5000
fault:
  # System fault: crash the TaskManager hosting the stateful AGGREGATE operator
  # (exercises keyed-state restore from checkpoint).
  sys:
    enabled: true
    stage: AGGREGATE
    triggerMode: EVERY_MS
    triggerN: 120000
    maxOccurrences: 3
    probability: 1.0
  # Application fault: throw inside the SOURCE operator (region failover).
  app:
    enabled: true
    stage: SOURCE
    triggerMode: EVERY_MS
    triggerN: 90000
    maxOccurrences: 3
    probability: 1.0
