global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: flink-jobmanager
    static_configs:
      - targets: ['jobmanager:9249']
        labels:
          role: jobmanager

  - job_name: flink-taskmanager
    static_configs:
      - targets: ['taskmanager:9249']
        labels:
          role: taskmanager
